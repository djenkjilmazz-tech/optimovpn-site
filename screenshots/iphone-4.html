<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393">
<title>OptimoVPN - Zero Logs Policy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 393px;
    height: 852px;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    background: linear-gradient(160deg, #0D1228 0%, #060A18 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .blob { position: absolute; border-radius: 50%; filter: blur(65px); pointer-events: none; }
  .blob-1 {
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(97,133,255,0.18) 0%, transparent 70%);
    top: -80px; right: -80px;
  }
  .blob-2 {
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(47,212,135,0.12) 0%, transparent 70%);
    top: 60px; left: -70px;
  }
  .blob-3 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(97,133,255,0.14) 0%, transparent 70%);
    bottom: 40px; left: -40px;
  }
  .blob-4 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,208,0,0.07) 0%, transparent 70%);
    bottom: 100px; right: -30px;
  }

  .stars { position: absolute; inset: 0; pointer-events: none; }
  .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.45); border-radius: 50%; }

  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 44px 24px 0;
    width: 100%;
  }
  .headline {
    font-size: 32px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(97,133,255,0.5);
  }
  .subtitle {
    font-size: 13.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.62);
    margin-top: 8px;
    letter-spacing: 0.1px;
    line-height: 1.4;
    max-width: 280px;
    margin-left: auto;
    margin-right: auto;
  }

  .phone-wrapper {
    position: relative;
    z-index: 10;
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }
  .phone-frame {
    width: 240px;
    height: 490px;
    background: #080D1C;
    border-radius: 36px;
    border: 1.5px solid rgba(97,133,255,0.28);
    box-shadow:
      0 0 0 6px rgba(97,133,255,0.07),
      0 30px 80px rgba(0,0,0,0.7),
      0 0 50px rgba(97,133,255,0.1),
      inset 0 1px 0 rgba(255,255,255,0.07);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .dynamic-island {
    width: 72px;
    height: 22px;
    background: #000;
    border-radius: 20px;
    margin: 10px auto 0;
    flex-shrink: 0;
  }
  .phone-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 14px 14px;
    gap: 0;
  }
  .phone-status-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 10px;
    padding: 0 2px;
    flex-shrink: 0;
  }

  /* Shield header inside phone */
  .shield-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .shield-icon-wrap {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: linear-gradient(140deg, rgba(97,133,255,0.25) 0%, rgba(47,212,135,0.15) 100%);
    border: 1px solid rgba(97,133,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    box-shadow: 0 0 20px rgba(97,133,255,0.2);
    font-size: 24px;
  }
  .shield-title {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.2px;
  }
  .shield-sub {
    font-size: 8px;
    color: rgba(255,255,255,0.38);
    margin-top: 2px;
  }

  /* Privacy cards */
  .privacy-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    flex: 1;
  }
  .privacy-card {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 11px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-icon-wrap {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .icon-blue  { background: rgba(97,133,255,0.15); }
  .icon-green { background: rgba(47,212,135,0.12); }
  .icon-gold  { background: rgba(255,208,0,0.12); }
  .card-text { flex: 1; min-width: 0; }
  .card-title {
    font-size: 9.5px;
    font-weight: 700;
    color: rgba(255,255,255,0.88);
    line-height: 1.2;
  }
  .card-desc {
    font-size: 8px;
    color: rgba(255,255,255,0.38);
    margin-top: 2px;
    line-height: 1.3;
  }
  .check-mark {
    font-size: 13px;
    color: #2FD487;
    flex-shrink: 0;
  }

  .feature-tag {
    position: relative;
    z-index: 10;
    margin-top: 16px;
    background: linear-gradient(90deg, rgba(47,212,135,0.18) 0%, rgba(97,133,255,0.15) 100%);
    border: 1px solid rgba(47,212,135,0.35);
    border-radius: 30px;
    padding: 7px 22px;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <div class="stars">
    <div class="star" style="top:5%;left:15%"></div>
    <div class="star" style="top:11%;left:80%"></div>
    <div class="star" style="top:19%;left:40%"></div>
    <div class="star" style="top:29%;left:92%"></div>
    <div class="star" style="top:44%;left:4%"></div>
    <div class="star" style="top:56%;left:89%"></div>
    <div class="star" style="top:65%;left:25%"></div>
    <div class="star" style="top:73%;left:72%"></div>
    <div class="star" style="top:84%;left:10%"></div>
    <div class="star" style="top:90%;left:58%"></div>
    <div class="star" style="top:16%;left:60%;width:3px;height:3px;background:rgba(97,133,255,0.55)"></div>
    <div class="star" style="top:78%;left:85%;width:3px;height:3px;background:rgba(47,212,135,0.5)"></div>
  </div>

  <div class="header">
    <div class="headline">Zero Logs<br>Policy</div>
    <div class="subtitle">We never track or store your browsing activity</div>
  </div>

  <div class="phone-wrapper">
    <div class="phone-frame">
      <div class="dynamic-island"></div>
      <div class="phone-content">

        <div class="phone-status-bar">
          <span>9:41</span>
          <span>●●●</span>
        </div>

        <div class="shield-header">
          <div class="shield-icon-wrap">🛡️</div>
          <div class="shield-title">Privacy Center</div>
          <div class="shield-sub">Your data is always safe</div>
        </div>

        <div class="privacy-cards">

          <div class="privacy-card">
            <div class="card-icon-wrap icon-blue">🛡️</div>
            <div class="card-text">
              <div class="card-title">No Activity Logs</div>
              <div class="card-desc">Browsing history never recorded</div>
            </div>
            <div class="check-mark">✓</div>
          </div>

          <div class="privacy-card">
            <div class="card-icon-wrap icon-green">🚫</div>
            <div class="card-text">
              <div class="card-title">No IP Tracking</div>
              <div class="card-desc">Your real IP stays hidden always</div>
            </div>
            <div class="check-mark">✓</div>
          </div>

          <div class="privacy-card">
            <div class="card-icon-wrap icon-gold">🔒</div>
            <div class="card-text">
              <div class="card-title">AES-256 Encryption</div>
              <div class="card-desc">Military-grade data protection</div>
            </div>
            <div class="check-mark">✓</div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <div class="feature-tag">100% Private</div>

</body>
</html>
